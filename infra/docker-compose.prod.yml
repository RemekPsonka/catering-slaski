version: "3.9"

# Production overlay — apply on top of docker-compose.yml
# Użycie:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d --build

services:
  postgres:
    # Production database powinien być na osobnej maszynie lub managed (Hetzner Managed Postgres)
    # Dla startu — local Docker volume z regularnymi backupami
    restart: always
    ports: !reset []  # Nie expose'ujemy na świat

  redis:
    restart: always
    ports: !reset []

  backend:
    restart: always
    environment:
      NODE_ENV: production
    ports: !reset []  # nginx jest single entry point

  storefront:
    restart: always
    environment:
      NODE_ENV: production
    ports: !reset []

  nginx:
    restart: always

  certbot:
    restart: always
