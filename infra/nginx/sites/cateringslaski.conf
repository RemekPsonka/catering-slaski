# ============================================
# Catering Śląski — main site
# Storefront + Admin + API behind single nginx
# ============================================

# Upstream: Next.js storefront
upstream storefront {
    server storefront:3000;
    keepalive 32;
}

# Upstream: Medusa backend
upstream medusa_api {
    server backend:9000;
    keepalive 32;
}

# HTTP — redirect all to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cateringslaski.pl www.cateringslaski.pl api.cateringslaski.pl admin.cateringslaski.pl;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# STOREFRONT — cateringslaski.pl
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cateringslaski.pl www.cateringslaski.pl;

    ssl_certificate /etc/letsencrypt/live/cateringslaski.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cateringslaski.pl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (only after testing)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # www → non-www redirect
    if ($host = "www.cateringslaski.pl") {
        return 301 https://cateringslaski.pl$request_uri;
    }

    location / {
        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://storefront;
        proxy_cache_valid 200 1y;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================
# API — api.cateringslaski.pl
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cateringslaski.pl;

    ssl_certificate /etc/letsencrypt/live/cateringslaski.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cateringslaski.pl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # General API — moderate rate limit
    location /store/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://medusa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI Generator — strict rate limit (5/min)
    location /store/ai/ {
        limit_req zone=ai burst=2 nodelay;
        proxy_pass http://medusa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;  # AI calls can take 20-30s
    }

    # Customer auth — anti-abuse
    location ~ ^/store/customers/(me|login|register|forgot-password) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://medusa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Webhooks IN — no rate limit (but HMAC verified server-side)
    location /webhooks/ {
        proxy_pass http://medusa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 5M;
    }

    # Health check
    location /health {
        proxy_pass http://medusa_api;
        access_log off;
    }
}

# ============================================
# ADMIN — admin.cateringslaski.pl
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.cateringslaski.pl;

    ssl_certificate /etc/letsencrypt/live/cateringslaski.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cateringslaski.pl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Optional: IP allowlist for admin
    # allow 1.2.3.4;     # twoje biuro
    # allow 5.6.7.8;     # backup
    # deny all;

    location / {
        proxy_pass http://medusa_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
